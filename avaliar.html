<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avalie o evento · Grupo BBDI</title>
<style>
:root{--ink:#0d2e33;--petrol:#17646f;--green:#3cbf47;--green-dark:#2a9134;--amber:#f2a91e;--paper:#f4f9f8;--line:#d8e6e5;--muted:#5b7a7e}
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,'Segoe UI',sans-serif}
body{background:var(--paper);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px}
.box{background:#fff;border:1px solid var(--line);border-radius:20px;box-shadow:0 10px 40px rgba(13,46,51,.1);max-width:440px;width:100%;padding:28px 24px;text-align:center}
.box img{height:52px;margin-bottom:14px}
h1{font-size:22px;letter-spacing:-.01em}
p.sub{color:var(--muted);font-size:14px;margin:6px 0 20px}
label{display:block;text-align:left;font-weight:700;font-size:13px;margin:16px 0 6px;color:var(--petrol)}
select,textarea{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px;font-size:15px;background:#fafdfc;color:var(--ink)}
textarea{resize:vertical;min-height:70px}
.notas{display:grid;grid-template-columns:repeat(11,1fr);gap:5px;margin-top:4px}
.notas button{border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:10px 0;font-size:15px;font-weight:700;cursor:pointer;color:var(--ink);transition:all .12s}
.notas button:hover{border-color:var(--green)}
.notas button.on{background:var(--green);border-color:var(--green);color:#fff;transform:scale(1.08)}
.legenda{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:4px}
.enviar{margin-top:22px;width:100%;background:var(--ink);color:#fff;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:800;cursor:pointer}
.enviar:hover{background:var(--petrol)}
.enviar:disabled{opacity:.5;cursor:wait}
.msg{margin-top:14px;font-size:14px;font-weight:600;display:none;border-radius:12px;padding:12px}
.msg.ok{display:block;background:#e2f6e3;color:var(--green-dark)}
.msg.err{display:block;background:#fdecec;color:#b3261e}
.thanks{display:none}
.thanks .big{font-size:52px;margin:10px 0}
.thanks b{font-size:20px}
.thanks p{color:var(--muted);font-size:14px;margin-top:8px}
.media{margin-top:16px;background:var(--paper);border-radius:14px;padding:14px;font-size:14px}
.media b{color:var(--petrol);font-size:22px}
</style>
</head>

  <div id="form">
    <h1>Como foi o evento?</h1>
    <p class="sub">Leva 30 segundos. Sua nota define a verba do próximo evento — nota média ≥ 8 libera +10%.</p>
    <label for="evento">Evento</label>
    <select id="evento"></select>
    <label for="setor">Seu setor</label>
    <select id="setor">
      <option>Marketing</option><option>Logística</option><option>SAC</option><option>Financeiro</option>
      <option>RMA</option><option>Comercial</option><option>TI</option><option>RH</option>
    </select>
    <label>Nota</label>
    <div class="notas" id="notas"></div>
    <div class="legenda"><span>😐 0 = fraco</span><span>🤩 10 = incrível</span></div>
    <label for="coment">Comentário (opcional)</label>
    <textarea id="coment" maxlength="300" placeholder="O que manter? O que melhorar?"></textarea>
    <button class="enviar" id="enviar">Enviar avaliação</button>
    <div class="msg" id="msg"></div>
  </div>

    <div class="big">💚</div>
    <b>Avaliação enviada!</b>
    <p>Obrigado por ajudar a construir os próximos eventos do Grupo BBDI.</p>
    <div class="media" id="media"></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://orrkjwchepxaqejkvbrh.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ycmtqd2NoZXB4YXFlamt2YnJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5OTk5OTksImV4cCI6MjA5OTU3NTk5OX0.AwngDFlMCu-PEXDurpu4LzTWH1pOvKpbfMpLMgNiCpM";
const sb = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

const EVENTOS = ["Bora 2026 (jan)","Remando Juntos — Navegantes (jan)","Esquenta BBDI Folia — Carnaval (fev)",
"Elas Movem o Grupo — Dia da Mulher (mar)","Caça aos Ovos — Páscoa (abr)","Quiz Brasil — Tiradentes (abr)",
"Mãos que Movem — Dia do Trabalhador (abr)","Mães do Grupo (mai)","Tapete Solidário — Corpus Christi (jun)",
"Arraiá do Grupo BBDI (jun)","Pais do Grupo (ago)","Independência das Ideias (set)",
"Semana Farroupilha + Mateada (set)","Criança Interior (out)","Raízes que Movem — Consciência Negra (nov)",
"Confraternização de Natal (dez)","Aniversariantes do Mês","Outro"];
const sel = document.getElementById("evento");
EVENTOS.forEach(e=>{const o=document.createElement("option");o.textContent=e;sel.appendChild(o)});

let nota = null;
const nDiv = document.getElementById("notas");
for(let i=0;i<=10;i++){
  const b=document.createElement("button");b.type="button";b.textContent=i;
  b.onclick=()=>{nota=i;[...nDiv.children].forEach(x=>x.classList.remove("on"));b.classList.add("on")};
  nDiv.appendChild(b);
}

document.getElementById("enviar").onclick = async function(){
  const msg=document.getElementById("msg");
  msg.className="msg";
  if(nota===null){msg.className="msg err";msg.textContent="Escolha uma nota de 0 a 10.";return}
  if(!sb){msg.className="msg err";msg.textContent="Sem conexão com o banco. Tente novamente.";return}
  this.disabled=true;this.textContent="Enviando...";
  const registro={evento:sel.value,setor:document.getElementById("setor").value,nota,comentario:document.getElementById("coment").value.trim()||null};
  const {error}=await sb.from("avaliacoes").insert(registro);
  if(error){
    this.disabled=false;this.textContent="Enviar avaliação";
    msg.className="msg err";msg.textContent="Não foi possível enviar. Verifique a internet e tente de novo.";
    return;
  }
  document.getElementById("form").style.display="none";
  document.getElementById("thanks").style.display="block";
  try{
    const {data}=await sb.from("avaliacoes").select("nota").eq("evento",registro.evento);
    if(data&&data.length){
      const m=(data.reduce((s,r)=>s+r.nota,0)/data.length).toFixed(1);
      document.getElementById("media").innerHTML=`Média deste evento até agora: <b>${m}</b> · ${data.length} avaliação(ões)`;
    }
  }catch(e){}
};
</script>
